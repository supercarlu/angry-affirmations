<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Affirmations</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #0047AB;
    font-family: 'Archivo Black', sans-serif;
    overflow: hidden;
    position: relative;
    padding: 2rem;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3rem;
    max-width: 680px;
    width: 100%;
    text-align: center;
  }

  .affirmation {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    line-height: 1.35;
    letter-spacing: -0.01em;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeIn 0.6s ease-out forwards;
    min-height: 3em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .buttons {
    display: flex;
    gap: 1rem;
  }

  .btn {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    padding: 1rem 2.8rem;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }

  .btn:hover {
    transform: scale(1.04);
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-next {
    color: #ffffff;
    background: #0047AB;
  }

  .btn-next:hover {
    background: #003580;
  }

  .btn-shuffle {
    color: #0047AB;
    background: transparent;
    border: 2px solid #0047AB;
  }

  .btn-shuffle:hover {
    background: rgba(0, 71, 171, 0.06);
  }

  .day-label {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(0, 71, 171, 0.25);
    position: fixed;
    bottom: 2rem;
  }
</style>
</head>
<body>

<div class="container">
  <p class="affirmation" id="affirmation"></p>
  <div class="buttons">
    <button class="btn btn-next" id="nextBtn">Next</button>
    <button class="btn btn-shuffle" id="shuffleBtn">Shuffle</button>
  </div>
</div>
<span class="day-label" id="dayLabel"></span>

<script>

  "Not my circus. Not my clowns. Not my problem.",

  "Anyone's discomfort with my confidence is not my issue.",

  "I'm not angry. I'm clear.",

  "If it costs me my peace, it's too expensive.",
  "I choose myself aggressively today.",
  "I don't chase. I attract. Or I move on.",
  "I'm allowed to change my mind. Permanently.",

  "I will no longer set myself on fire to keep others warm.",
  "Today's energy: unbothered, moisturised, thriving.",
  "I didn't lose them. I dropped them. There's a difference.",
  "My potential doesn't need anyone's approval.",

  "I don't have time to hate anyone. I'm busy being great.",
  "I will not apologise for taking up space.",

  "I'm not bossy. I have leadership skills and no patience.",
  "My worth is not determined by anyone's ability to see it.",

  "The table was too small so I built my own.",
  "I'm not for the faint-hearted. Never was.",
  "Nobody can rush a woman who is rebuilding herself.",
  "I stopped explaining myself. The right people get it.",
  "I am soft where I choose and steel where I must.",
  "I don't compete. I'm in a league of my own.",
  "My patience ran out. My power didn't.",
  "I will be kind but I will not be a pushover.",
  "I am not responsible for anyone's inability to handle my honesty.",
  "I didn't wake up today to be mediocre.",

  "I will not water myself down because someone can't handle me at full strength.",
  "I don't need closure from people who never had the depth to understand me.",
  "My healing doesn't look pretty, and I don't care if it makes anyone uncomfortable.",
  "I refuse to beg for a seat at a table I built from scratch.",
  "The only opinion of me that pays my bills is my own.",

  "I stopped performing for an audience that never bought a ticket.",
  "I am done being the bigger person. Today I am the scarier person.",

  "I am not too much. They are simply not enough.",

  "I will not manage anyone's emotions about my boundaries.",
  "I am both the lesson and the test no one was prepared for.",
  "My standards are not walls. They are filters. And not everyone passes.",
  "I stopped trying to fix people who are committed to staying broken.",
  "I will not apologise for evolving past the version of me others were comfortable with.",
  "I don't need everyone to understand me. I need me to understand me.",

  "I am not here to make anyone's insecurity feel at home.",

  "I will not rehearse my pain to make it digestible for others.",
  "If someone is intimidated by a woman who knows what she wants, that's their problem.",

  "I no longer explain my fire to people who have never been burned.",
  "Overthinking is just my brain doing squats. It's exhausting but I'm still standing.",
  "I will not fit myself into a box built with leftover pieces of someone else's fear.",

  "I will not be grateful for crumbs from a table I helped build.",
  "My anger is not ugly. My anger is the first honest thing I've felt in years.",
  "I am not dramatic. I am finally reacting appropriately to how I've been treated.",
  "I wasted years making myself smaller and I want every single second back.",
  "I am allowed to be angry about things I once accepted because I didn't know better.",
  "I refuse to thank the people who broke me for making me stronger.",
  "The version of me that tolerated all of that is dead. Send flowers.",
  "I am not being bitter. I am being accurate.",
  "Every time someone calls me too intense, I know I'm doing something right.",

  "I would rather be feared than forgotten.",
  "I burned the bridge, salted the earth, and I'd do it again.",
  "My kindness was real. So is my fury. Pick which one to meet today.",
  "I am not sorry for outgrowing a cage someone else built around me.",
  "I am done being the understanding one. Today I am the understood one, or there will be problems.",

// Fisher-Yates shuffle to create a randomized deck
function createShuffledDeck() {
  const indices = Array.from({ length: affirmations.length }, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return indices;
}

let deck = createShuffledDeck();
let position = 0;

function showAffirmation(index) {
  const el = document.getElementById('affirmation');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeIn 0.6s ease-out forwards';
  el.textContent = affirmations[index];
}

function next() {
  position++;
  if (position >= deck.length) {
    deck = createShuffledDeck();
    position = 0;
  }
  showAffirmation(deck[position]);
}

function shuffle() {
  const remaining = deck.slice(position + 1);
  for (let i = remaining.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
  }
  deck = [...deck.slice(0, position + 1), ...remaining];
  next();
}

// Day label
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
document.getElementById('dayLabel').textContent =
  `${days[now.getDay()]} \u00b7 ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

// Init
showAffirmation(deck[0]);

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
</script>
</body>
</html>
